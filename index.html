<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.N.Notes</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f2f2f7;
    color:#000;
}

.dark{
    background:#1c1c1e;
    color:white;
}

#lockScreen{
    position:fixed;
    inset:0;
    background:#000;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#pin{
    padding:15px;
    font-size:30px;
    text-align:center;
    width:120px;
    border-radius:15px;
    border:none;
}

header{
    padding:20px;
    background:white;
    position:sticky;
    top:0;
}

.dark header{
    background:#2c2c2e;
}

h1{
    margin:0;
}

input,select,textarea{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    border-radius:12px;
    border:1px solid #ccc;
    margin-top:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:#007aff;
    color:white;
}

.note{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:15px;
}

.dark .note{
    background:#2c2c2e;
}

.date{
    color:gray;
    font-size:12px;
}

.star{
    float:right;
    font-size:22px;
    cursor:pointer;
}
</style>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  import {
    getFirestore,
    doc,
    setDoc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "TA_CLE_API",
    authDomain: "TON-PROJET.firebaseapp.com",
    projectId: "TON-PROJET",
    storageBucket: "TON-PROJET.appspot.com",
    messagingSenderId: "XXXXXXXX",
    appId: "XXXXXXXX"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // INSCRIPTION
  window.inscription = async function () {

    let pseudo = document.getElementById("pseudo").value;
    let email = document.getElementById("email").value;
    let mdp = document.getElementById("password").value;

    try {

      const userCredential =
        await createUserWithEmailAndPassword(auth, email, mdp);

      const user = userCredential.user;

      await setDoc(doc(db, "users", user.uid), {
        pseudo: pseudo,
        email: email
      });

      alert("Compte créé !");

    } catch (error) {
      alert(error.message);
    }
  }

  // CONNEXION
  window.connexion = async function () {

    let email = document.getElementById("emailConnexion").value;
    let mdp = document.getElementById("passwordConnexion").value;

    try {

      await signInWithEmailAndPassword(auth, email, mdp);

    } catch (error) {
      alert(error.message);
    }
  }

  // DECONNEXION
  window.deconnexion = function () {
    signOut(auth);
  }

  // SI CONNECTÉ
  onAuthStateChanged(auth, async (user) => {

    if (user) {

      const docRef = doc(db, "users", user.uid);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {

        document.getElementById("bienvenue").innerHTML =
          "Bienvenue " + docSnap.data().pseudo;

      }

    } else {

      document.getElementById("bienvenue").innerHTML =
        "Non connecté";

    }

  });

</script></head>

<body><h2>Créer un compte</h2>

<input id="pseudo" placeholder="Pseudo">

<input id="email" type="email"
placeholder="Email">

<input id="password" type="password"
placeholder="Mot de passe">

<button onclick="inscription()">
Créer le compte
</button>
    <h2>Connexion</h2>

<input id="emailConnexion"
type="email"
placeholder="Email">

<input id="passwordConnexion"
type="password"
placeholder="Mot de passe">

<button onclick="connexion()">
Connexion
</button>

<div id="lockScreen">
<h1>🔒 C.N.Notes</h1>
<p>Entrez votre code</p>
<input type="password" id="pin" maxlength="4">
<button onclick="unlock()">Déverrouiller</button>
</div>

<header>
<h1>C.N.Notes</h1>

<input id="search" placeholder="🔍 Rechercher..." onkeyup="displayNotes()">

<select id="folder">
<option>Personnel</option>
<option>Travail</option>
<option>Études</option>
<option>Idées</option>
</select>

<button onclick="toggleDark()">🌙 Mode sombre</button>
</header>

<div style="padding:15px">
<input id="title" placeholder="Titre">
<textarea id="content" rows="6" placeholder="Écrire une note..."></textarea>
<button onclick="addNote()">Ajouter la note</button>
</div>

<div id="notes"></div>

<script>

const CODE="1234";

function unlock(){
    if(document.getElementById("pin").value===CODE){
        document.getElementById("lockScreen").style.display="none";
    }else{
        alert("Code incorrect");
    }
}

let notes=JSON.parse(localStorage.getItem("cnnotes"))||[];

function save(){
    localStorage.setItem("cnnotes",JSON.stringify(notes));
}

function addNote(){

    let title=document.getElementById("title").value;
    let content=document.getElementById("content").value;
    let folder=document.getElementById("folder").value;

    if(title==="") return;

    notes.unshift({
        title,
        content,
        folder,
        date:new Date().toLocaleString(),
        pinned:false
    });

    save();

    document.getElementById("title").value="";
    document.getElementById("content").value="";

    displayNotes();
}

function pin(i){
    notes[i].pinned=!notes[i].pinned;
    save();
    displayNotes();
}

function displayNotes(){

    let zone=document.getElementById("notes");
    let search=document.getElementById("search").value.toLowerCase();

    zone.innerHTML="";

    notes.sort((a,b)=>b.pinned-a.pinned);

    notes.forEach((n,i)=>{

        if(
        !n.title.toLowerCase().includes(search) &&
        !n.content.toLowerCase().includes(search)
        ) return;

        zone.innerHTML+=`
        <div class="note">
            <span class="star" onclick="pin(${i})">
            ${n.pinned ? "⭐":"☆"}
            </span>

            <h2>${n.title}</h2>

            <small>${n.folder}</small>

            <p>${n.content.replace(/\n/g,"<br>")}</p>

            <div class="date">${n.date}</div>
        </div>
        `;
    });
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

displayNotes();

</script>

</body>
</html>
