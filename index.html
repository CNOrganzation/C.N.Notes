<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.N.Notes</title>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f2f2f7;color:#000}
.dark{background:#1c1c1e;color:#fff}
header{padding:20px;background:#fff;position:sticky;top:0}
.dark header{background:#2c2c2e}
input,select,textarea,button{width:100%;box-sizing:border-box;padding:12px;margin-top:10px;border-radius:12px}
button{background:#007aff;color:#fff;border:none}
.note{background:#fff;margin:15px;padding:15px;border-radius:15px}
.dark .note{background:#2c2c2e}
.date{color:gray;font-size:12px}
.star{float:right;cursor:pointer}
#authBox{padding:20px}
</style>
</head>
<body>

<div id="authBox">
<h2>C.N.Notes - Connexion</h2>
<input id="pseudo" placeholder="Pseudo">
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">

<button id="btnInscription">Créer un compte</button>
<button id="btnConnexion">Connexion</button>
<button id="btnDeconnexion">Déconnexion</button>

<p id="bienvenue">Non connecté</p>
</div>

<header>
<h1>C.N.Notes</h1>
<input id="search" placeholder="🔍 Rechercher..." onkeyup="displayNotes()">
<select id="folder">
<option>Personnel</option>
<option>Travail</option>
<option>Études</option>
<option>Idées</option>
</select>
<button onclick="toggleDark()">🌙 Mode sombre</button>
</header>

<div style="padding:15px">
<input id="title" placeholder="Titre">
<textarea id="content" rows="6" placeholder="Écrire une note..."></textarea>
<button onclick="addNote()">Ajouter la note</button>
</div>

<div id="notes"></div>

<script>
let notes = [];

function save(){
    if(auth.currentUser){
        const cle = "cnnotes_" + auth.currentUser.email;
        localStorage.setItem(cle, JSON.stringify(notes));
    }
}

function addNote(){
 let title=document.getElementById("title").value;
 let content=document.getElementById("content").value;
 let folder=document.getElementById("folder").value;
 if(title==="") return;

 notes.unshift({
   title,content,folder,
   date:new Date().toLocaleString(),
   pinned:false
 });

 save();
 document.getElementById("title").value="";
 document.getElementById("content").value="";
 displayNotes();
}

function pin(i){
 notes[i].pinned=!notes[i].pinned;
 save();
 displayNotes();
}

function displayNotes(){
 let zone=document.getElementById("notes");
 let search=document.getElementById("search").value.toLowerCase();
 zone.innerHTML="";
 notes.sort((a,b)=>b.pinned-a.pinned);

 notes.forEach((n,i)=>{
   if(!n.title.toLowerCase().includes(search) &&
      !n.content.toLowerCase().includes(search)) return;

   zone.innerHTML += `
   <div class="note">
    <span class="star" onclick="pin(${i})">${n.pinned?"⭐":"☆"}</span>
    <h2>${n.title}</h2>
    <small>${n.folder}</small>
    <p>${n.content.replace(/\n/g,"<br>")}</p>
    <div class="date">${n.date}</div>
   </div>`;
 });
}

function toggleDark(){
 document.body.classList.toggle("dark");
}

displayNotes();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
 getAuth,
 createUserWithEmailAndPassword,
 signInWithEmailAndPassword,
 signOut,
 onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyA7o5nKUfrlAeNGQ7z5S7c8e3HK1FdPyNw",
 authDomain: "cnnotes-base-de-donnees.firebaseapp.com",
 projectId: "cnnotes-base-de-donnees",
 storageBucket: "cnnotes-base-de-donnees.firebasestorage.app",
 messagingSenderId: "637259833912",
 appId: "1:637259833912:web:2493c60591ebf100c73ccd",
 measurementId: "G-L0QQ3KFF7K"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("btnInscription").onclick = async () => {
 try{
   await createUserWithEmailAndPassword(
     auth,
     email.value,
     password.value
   );
   alert("Compte créé !");
 }catch(e){ alert(e.message); }
};

document.getElementById("btnConnexion").onclick = async () => {
 try{
   await signInWithEmailAndPassword(
     auth,
     email.value,
     password.value
   );
 }catch(e){ alert(e.message); }
};

document.getElementById("btnDeconnexion").onclick = () => signOut(auth);

onAuthStateChanged(auth, user => {

    if(user){

        document.getElementById("bienvenue").textContent =
        "Connecté : " + user.email;

        const cle = "cnnotes_" + user.email;

        notes = JSON.parse(
            localStorage.getItem(cle)
        ) || [];

        displayNotes();

    } else {

        document.getElementById("bienvenue").textContent =
        "Non connecté";

        notes = [];

        displayNotes();
    }
});
});
</script>

</body>
</html>
